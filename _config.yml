title: "Richard Costa"
author: "Richard Costa"
description: "Just a personal website"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout

show_excerpts: false        # show article excerpts on the home page
show_frame: true          # adds a gray frame to the site
show_sidebar: true        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu

navigation:                # accepts {file, title, url, icon, sidebaricon}
  - {file: "index.md", title: "Home", icon: house}
  - {file: "blog.html", title: "Blog", icon: pencil}
  - {file: "index_posts.md", title: "Pages Index"}

external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: "mailto:scosta.richard@gmail.com"}
  - {title: Github, icon: github, url: "https://github.com/richard-costa"}
  - {title: Twitter, icon: twitter, url: "https:/twitter.com/richsicist"}
  - {title: Blog Theme, url: https://github.com/niklasbuschmann/contrast, icon: github}
 #  - {title: Subscribe, icon: rss, url: "/feed.xml"}

comments:
  disqus_shortname: ""    # see https://disqus.com/
#  isso_domain: ""         # see https://posativ.org/isso/

plugins:
 - jekyll-feed
